<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigo Insight - QA Testing</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --primary: #3b82f6; --success: #10b981; --danger: #ef4444; }
        body { font-family: sans-serif; background: var(--bg-color); color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card-bg); padding: 30px; border-radius: 16px; width: 100%; max-width: 500px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .loader { display: none; text-align: center; margin-top: 20px; color: var(--primary); font-weight: bold; }
        .result-box { display: none; margin-top: 25px; padding: 15px; border-radius: 8px; background: #0f172a; border-left: 4px solid var(--success); word-wrap: break-word; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:#3b82f6;">Amigo QA Tester</h2>
    <label>Live Survey Link</label>
    <input type="url" id="link" required>
    
    <label>Country Code</label>
    <input type="text" id="country" value="AR" required>
    
    <label>Test UID</label>
    <input type="text" id="uid" value="TEST1" required>
    
    <button onclick="runTest()" id="testBtn">Run Auto-Click QA</button>
    <div class="loader" id="loader">Processing... Proxy matching & Auto-clicking...</div>
    
    <div class="result-box" id="resultBox">
        <h3 id="resultStatus" style="margin-top:0;"></h3>
        <div style="font-size: 13px; color: #94a3b8; margin-top: 10px;">Final Captured URL: <br> <span id="finalUrl" style="color: white;"></span></div>
    </div>
</div>

<script>
    async function runTest() {
        const link = document.getElementById('link').value;
        const uid = document.getElementById('uid').value;
        if(!link) return alert("Link daaliye!");

        document.getElementById('testBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultBox').style.display = 'none';

        try {
            const res = await fetch('/run_test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ link, uid })
            });
            const data = await res.json();
            
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('finalUrl').innerText = data.final_url || "Error";
            
            const statusEl = document.getElementById('resultStatus');
            if(data.status === "success") {
                document.getElementById('resultBox').style.borderLeftColor = "var(--success)";
                statusEl.innerText = "✅ " + data.message;
                statusEl.style.color = "var(--success)";
            } else {
                document.getElementById('resultBox').style.borderLeftColor = "var(--danger)";
                statusEl.innerText = "❌ Error";
                statusEl.style.color = "var(--danger)";
            }
        } catch(e) { alert("Server connection error"); }

        document.getElementById('loader').style.display = 'none';
        document.getElementById('testBtn').style.display = 'block';
    }
</script>
</body>
</html>
