<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigo Insight - QA Testing</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; margin-top: 0; color: var(--primary); font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: var(--primary); }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: var(--primary-hover); }
    </style>
</head>
<body>

<div class="container">
    <h2>Amigo QA Tester</h2>
    <div class="form-group">
        <label>Live Survey Link</label>
        <input type="url" id="link" placeholder="Paste link from dashboard here..." required>
    </div>
    <div class="form-group">
        <label>Country Code (e.g., US, AR, MX)</label>
        <input type="text" id="country" value="MX" required>
    </div>
    <div class="form-group">
        <label>Test UID (e.g., TEST1)</label>
        <input type="text" id="uid" value="TEST1" required>
    </div>
    <button onclick="runTest()" id="testBtn">Run QA Test</button>
</div>

<script>
    function runTest() {
        let link = document.getElementById('link').value.trim();
        const uid = document.getElementById('uid').value.trim();
        
        if(!link) {
            alert("Bhai, pehle Live Survey Link daalein!");
            return;
        }

        // Agar link mein http nahi hai toh auto-add karega
        if (!link.startsWith('http://') && !link.startsWith('https://')) {
            link = 'https://' + link;
        }

        try {
            let urlObj = new URL(link);
            let params = new URLSearchParams(urlObj.search);
            
            // Purani UID hata kar nayi daalna
            params.delete('UID');
            params.delete('uid');
            params.set('UID', uid);
            
            urlObj.search = params.toString();
            const testUrl = urlObj.toString();

            // DUNIYA KA KOI BROWSER ISKO NAHI ROK SAKTA (Same tab redirect)
            window.location.href = testUrl;
            
        } catch(e) {
            alert("Link me kuch gadbad hai, please check: " + link);
        }
    }
</script>
</body>
</html>
