<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigo Insight - QA Testing</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; margin-top: 0; color: var(--primary); font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: var(--primary); }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: var(--primary-hover); }
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: var(--primary);
            font-weight: bold;
        }
        .result-box {
            display: none;
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            background-color: #0f172a;
            border-left: 4px solid var(--success);
            word-wrap: break-word;
        }
        .url-text { font-size: 13px; color: var(--text-muted); margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Amigo QA Tester</h2>
    <div class="form-group">
        <label>Live Survey Link</label>
        <input type="url" id="link" placeholder="Paste link from dashboard here..." required>
    </div>
    <div class="form-group">
        <label>Country Code (e.g., US, AR, MX)</label>
        <input type="text" id="country" value="MX" required>
    </div>
    <div class="form-group">
        <label>Test UID (e.g., TEST1)</label>
        <input type="text" id="uid" value="TEST1" required>
    </div>
    <button onclick="runTest()" id="testBtn">Run QA Test</button>

    <div class="loader" id="loader">Running test via Proxy... Please wait.</div>
    
    <div class="result-box" id="resultBox">
        <h3 id="resultStatus" style="margin-top:0;"></h3>
        <div class="url-text">Final URL: <br> <span id="finalUrl" style="color: white;"></span></div>
    </div>
</div>

<script>
    async function runTest() {
        const link = document.getElementById('link').value;
        const country = document.getElementById('country').value;
        const uid = document.getElementById('uid').value;
        
        if(!link) return alert("Please enter a link!");

        document.getElementById('testBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultBox').style.display = 'none';

        try {
            const response = await fetch('/run_test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ link, country, uid })
            });
            const data = await response.json();
            
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('finalUrl').innerText = data.final_url || "Failed to load";
            
            const statusEl = document.getElementById('resultStatus');
            if(data.status === "success") {
                document.getElementById('resultBox').style.borderLeftColor = "var(--success)";
                statusEl.innerText = "✅ " + data.message;
                statusEl.style.color = "var(--success)";
            } else {
                document.getElementById('resultBox').style.borderLeftColor = "var(--danger)";
                statusEl.innerText = "❌ Error Occurred";
                statusEl.style.color = "var(--danger)";
            }
        } catch(e) {
            alert("Connection error!");
        }

        document.getElementById('loader').style.display = 'none';
        document.getElementById('testBtn').style.display = 'block';
    }
</script>
</body>
</html>
